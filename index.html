<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>只要有人 Idea 靈感搜尋狂魔</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #fafaf8;
      color: #1a1a1a;
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 60px 20px 40px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 32px;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, #b388ff, #ff80ab, #ffd740, #b388ff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      to { background-position: 200% center; }
    }

    .idea-count {
      text-align: center;
      font-size: 0.85rem;
      color: #bbb;
      margin-top: -20px;
      margin-bottom: 28px;
    }

    .idea-count strong {
      color: #999;
      font-weight: 600;
    }

    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }

    .search-bar input {
      flex: 1;
      padding: 12px 16px;
      font-family: inherit;
      font-size: 0.95rem;
      border: 1px solid #e8e8e5;
      border-radius: 8px;
      background: #ffffff;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar input:focus {
      border-color: #c0c0bc;
    }

    .search-bar input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .search-bar button {
      padding: 12px 24px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      background: #1a1a1a;
      color: #ffffff;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .search-bar button:hover {
      opacity: 0.85;
    }

    .search-bar button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px 0;
      color: #999;
      font-size: 0.9rem;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #e8e8e5;
      border-top-color: #999;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error */
    .error {
      text-align: center;
      padding: 40px 0;
      color: #c0392b;
      font-size: 0.9rem;
    }

    .error button {
      margin-top: 12px;
      padding: 8px 20px;
      font-family: inherit;
      font-size: 0.85rem;
      border: 1px solid #c0392b;
      border-radius: 6px;
      background: transparent;
      color: #c0392b;
      cursor: pointer;
    }

    .error button:hover {
      background: #c0392b;
      color: #fff;
    }

    /* Empty / no results */
    .empty-state {
      text-align: center;
      padding: 40px 0;
      color: #999;
      font-size: 0.9rem;
    }

    /* Section heading */
    .section-heading {
      font-size: 0.85rem;
      color: #999;
      margin-bottom: 16px;
    }

    /* Cards */
    .card {
      background: #ffffff;
      border: 1px solid #e8e8e5;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 12px;
    }

    .card-summary {
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.7;
      margin-bottom: 10px;
      color: #1a1a1a;
    }

    .card-content {
      font-size: 0.85rem;
      line-height: 1.7;
      color: #555;
      margin-bottom: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      border-left: 3px solid #e0e0dc;
      padding-left: 14px;
      margin-left: 2px;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .card-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      font-family: inherit;
      font-size: 0.75rem;
      color: #4a7c96;
      background: #f0f7fa;
      border: 1px solid #d4e8f0;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.15s;
    }

    .card-btn:hover {
      background: #e2eff5;
    }

    .card-footer {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 8px 16px;
      font-size: 0.75rem;
      color: #aaa;
      padding-top: 12px;
      border-top: 1px solid #f0f0ed;
    }

    .card-tags {
      font-size: 0.7rem;
      color: #aaa;
      line-height: 1.8;
    }

    .card-tags .more-tags {
      cursor: default;
      position: relative;
      color: #bbb;
    }

    .card-tags .more-tags .tooltip {
      display: none;
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      font-size: 0.7rem;
      padding: 6px 10px;
      border-radius: 6px;
      max-width: 300px;
      white-space: normal;
      z-index: 10;
      margin-bottom: 4px;
    }

    .card-tags .more-tags:hover .tooltip {
      display: block;
    }

    .site-footer {
      text-align: center;
      padding: 32px 0 0;
      margin-top: 24px;
      border-top: 1px solid #e8e8e5;
      font-size: 0.8rem;
    }

    .site-footer a {
      color: #aaa;
      text-decoration: none;
    }

    .site-footer a:hover {
      color: #888;
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .container {
        padding: 40px 16px 32px;
      }

      h1 {
        font-size: 1.3rem;
        margin-bottom: 24px;
      }

      .card {
        padding: 16px;
      }

      .card-meta {
        flex-direction: column;
        gap: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✨ 只要有人 Idea 靈感搜尋狂魔 🔮</h1>
    <div id="ideaCount" class="idea-count"></div>

    <div class="search-bar">
      <input
        type="text"
        id="searchInput"
        placeholder="輸入關鍵字搜尋 Idea（多個關鍵字用空格分隔）"
        disabled
      >
      <button id="searchBtn" disabled>搜尋</button>
    </div>

    <div id="status"></div>
    <div id="results"></div>

    <div class="site-footer">
      <a href="https://docs.google.com/spreadsheets/d/1eYHwf1ECW67B6iZi92uUHB-xDEKNERnPMGayKB7Mnjs/edit?usp=sharing" target="_blank" rel="noopener noreferrer">📋 開啟只要有人靈感倉庫</a>
    </div>
  </div>

  <script>
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbxBoTnssI6IuILd5NsvAs1lbTBuhQmYUVbCNAbwtq0PR5UHzQroL0RHAUmFnj3Mx-ol4Q/exec';

    var allData = [];
    var searchInput = document.getElementById('searchInput');
    var searchBtn = document.getElementById('searchBtn');
    var statusEl = document.getElementById('status');
    var resultsEl = document.getElementById('results');
    var ideaCountEl = document.getElementById('ideaCount');

    // 載入資料
    function loadData() {
      statusEl.innerHTML =
        '<div class="loading">' +
          '<div class="loading-spinner"></div>' +
          '<div>資料庫更新中，請稍候...</div>' +
        '</div>';
      resultsEl.innerHTML = '';
      searchInput.disabled = true;
      searchBtn.disabled = true;

      fetch(GAS_URL)
        .then(function(res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(function(data) {
          allData = data;
          statusEl.innerHTML = '';
          ideaCountEl.innerHTML = '已收集 <strong>' + allData.length + '</strong> 個靈感點子';
          searchInput.disabled = false;
          searchBtn.disabled = false;
          searchInput.focus();
          showLatest();
        })
        .catch(function() {
          statusEl.innerHTML =
            '<div class="error">' +
              '<div>無法載入資料，請確認網路連線後再試</div>' +
              '<button onclick="loadData()">重試</button>' +
            '</div>';
        });
    }

    // 顯示最新 6 筆
    function showLatest() {
      var sorted = allData.slice().sort(function(a, b) {
        return (b.date || '').localeCompare(a.date || '');
      });
      var latest = sorted.slice(0, 6);

      if (latest.length === 0) return;

      statusEl.innerHTML =
        '<div class="section-heading">最新靈感 ✨</div>';

      var html = '';
      for (var i = 0; i < latest.length; i++) {
        html += renderCard(latest[i]);
      }
      resultsEl.innerHTML = html;
    }

    // 搜尋
    function doSearch() {
      var query = searchInput.value.trim();

      if (!query) {
        showLatest();
        return;
      }

      var keywords = query.toLowerCase().split(/\s+/);

      var matched = allData.filter(function(item) {
        var text = ((item.summary || '') + ' ' + (item.tags || '')).toLowerCase();
        return keywords.every(function(kw) {
          return text.indexOf(kw) !== -1;
        });
      });

      matched.sort(function(a, b) {
        return (b.date || '').localeCompare(a.date || '');
      });

      if (matched.length === 0) {
        statusEl.innerHTML = '';
        resultsEl.innerHTML =
          '<div class="empty-state">找不到符合「' + escapeHtml(query) + '」的結果</div>';
        return;
      }

      statusEl.innerHTML =
        '<div class="section-heading">找到 ' + matched.length + ' 筆結果</div>';

      var html = '';
      for (var i = 0; i < matched.length; i++) {
        html += renderCard(matched[i]);
      }
      resultsEl.innerHTML = html;
    }

    function renderCard(item) {
      var card = '<div class="card">';

      // 摘要
      card += '<div class="card-summary">' + escapeHtml(item.summary || '') + '</div>';

      // 原文（引用樣式，上限 150 字）
      var content = item.content || '';
      if (content) {
        var truncated = content.length > 150;
        var displayContent = truncated ? content.substring(0, 150) + '...' : content;
        card += '<div class="card-content">' + escapeHtml(displayContent) + '</div>';
      }

      // 按鈕：Slack 原文 + 參考連結
      var hasSource = item.source;
      var hasUrl = item.url && item.url !== item.source;
      if (hasSource || hasUrl) {
        card += '<div class="card-actions">';
        if (hasSource) {
          card += '<a class="card-btn" href="' + escapeHtml(item.source) + '" target="_blank" rel="noopener noreferrer">💬 Slack 原文</a>';
        }
        if (hasUrl) {
          card += '<a class="card-btn" href="' + escapeHtml(item.url) + '" target="_blank" rel="noopener noreferrer">🔗 參考連結</a>';
        }
        card += '</div>';
      }

      // Footer：撰寫者、日期、標籤
      card += '<div class="card-footer">';
      if (item.author) {
        card += '<span>' + escapeHtml(item.author) + '</span>';
      }
      if (item.date) {
        card += '<span>' + escapeHtml(item.date) + '</span>';
      }

      // 標籤：顯示 3 個 + hover 看更多
      if (item.tags) {
        var tags = item.tags.split(/[,、，]+/).map(function(t) { return t.trim(); }).filter(Boolean);
        if (tags.length > 0) {
          var visible = tags.slice(0, 3);
          var hidden = tags.slice(3);
          var tagsHtml = '<span class="card-tags">';
          tagsHtml += visible.map(function(t) { return '#' + escapeHtml(t); }).join('  ');
          if (hidden.length > 0) {
            tagsHtml += '  <span class="more-tags">... +' + hidden.length +
              '<span class="tooltip">' + hidden.map(function(t) { return '#' + escapeHtml(t); }).join('  ') + '</span>' +
              '</span>';
          }
          tagsHtml += '</span>';
          card += tagsHtml;
        }
      }

      card += '</div>';
      card += '</div>';
      return card;
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    // 事件綁定
    searchBtn.addEventListener('click', doSearch);
    searchInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doSearch();
    });

    // 頁面載入時抓取資料
    loadData();
  </script>
</body>
</html>
